<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capstone Task Board</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 50px; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 400px; }
        h2 { color: #2c3e50; text-align: center; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px 15px; background: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer; }
        ul { list-style: none; padding: 0; }
        li { background: #fff; margin-bottom: 10px; padding: 12px; border-radius: 5px; border-left: 5px solid #3498db; display: flex; justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <div class="container">
        <h2>✅ Capstone Tasks</h2>
        <div class="input-group">
            <input type="text" id="taskInput" placeholder="Add a new milestone...">
            <button onclick="addTask()">Add</button>
        </div>
        <ul id="taskList">
            <li>Secure Terraform IaC 🔒</li>
            <li>Automated Jenkins Pipeline ⚙️</li>
            <li>K8s Cluster Deployment 🚀</li>
        </ul>
    </div>
    <script>
        function addTask() {
            const input = document.getElementById('taskInput');
            if (input.value === '') return;
            const li = document.createElement('li');
            li.textContent = input.value;
            document.getElementById('taskList').appendChild(li);
            input.value = '';
        }
    </script>
</body>
</html>
